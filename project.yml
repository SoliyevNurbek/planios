name: Planios
options:
  deploymentTarget:
    iOS: 16.0
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.example.planios
    SWIFT_VERSION: 5.0
targets:
  Planios:
    type: application
    platform: iOS
    sources:
      - path: Planios
        excludes:
          - Docs
    resources:
      - path: Planios/Resources
    info:
      path: Planios/Info.plist
      properties:
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_NAME: Planios
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: 1
        SUPPORTS_MACCATALYST: false
